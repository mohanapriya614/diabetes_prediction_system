<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diabetes Prediction System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f7fc;
}

.container{
    width:60%;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#0077b6;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#0077b6;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#023e8a;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:green;
}
</style>

</head>

<body>

<div class="container">

    <h1>Diabetes Risk Prediction</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="Pregnancies">Pregnancies</label>
            <input type="number" id="Pregnancies" name="Pregnancies" required>
        </div>

        <div class="form-group">
            <label for="Glucose">Glucose</label>
            <input type="number" id="Glucose" name="Glucose" required>
        </div>

        <div class="form-group">
            <label for="BloodPressure">Blood Pressure</label>
            <input type="number" id="BloodPressure" name="BloodPressure" required>
        </div>

        <div class="form-group">
            <label for="SkinThickness">Skin Thickness</label>
            <input type="number" id="SkinThickness" name="SkinThickness" required>
        </div>

        <div class="form-group">
            <label for="Insulin">Insulin</label>
            <input type="number" id="Insulin" name="Insulin" required>
        </div>

        <div class="form-group">
            <label for="BMI">BMI</label>
            <input type="number" step="0.01" id="BMI" name="BMI" required>
        </div>

        <div class="form-group">
            <label for="DiabetesPedigreeFunction">
                Diabetes Pedigree Function
            </label>
            <input type="number" step="0.001"
                   id="DiabetesPedigreeFunction"
                   name="DiabetesPedigreeFunction"
                   required>
        </div>

        <div class="form-group">
            <label for="Age">Age</label>
            <input type="number" id="Age" name="Age" required>
        </div>

        <button type="submit">
            Predict Diabetes
        </button>

    </form>

    {% if result %}
    <div class="result">
        {{ result }}
    </div>
    {% endif %}

</div>

</body>
</html>
